name: Build predict executables

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache dataset
        id: cache-dataset
        uses: actions/cache@v4
        with:
          path: datasets/yanco-2019-wheat-pcd/data
          key: dataset-v2-${{ hashFiles('datasets/yanco-2019-wheat-pcd/**') }}

      - name: Cache results
        id: cache-results
        uses: actions/cache@v4
        with:
          path: results
          key: results-v2-${{ hashFiles('main.py', 'batch.py', 'analyze.py', 'tpcve/core/**/*.py', 'tpcve/methods/**/*.py') }}

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run full pipeline
        if: steps.cache-results.outputs.cache-hit != 'true'
        run: uv run python main.py

      - name: Cache predict.py
        id: cache-predict
        uses: actions/cache@v4
        with:
          path: predict.py
          key: predict-${{ hashFiles('main.py', 'batch.py', 'analyze.py', 'tools/freeze_model.py', '.github/workflows/build-predict.yml', 'tpcve/core/**/*.py', 'tpcve/methods/**/*.py') }}

      - name: Generate predict.py from frozen models
        if: steps.cache-predict.outputs.cache-hit != 'true'
        run: uv run python tools/freeze_model.py --stage all

      - name: Package figures zip
        run: |
          if [ -d results/figures/summary ]; then
            cd results && zip -X -r ../figures-summary.zip figures/summary/
          fi

      - name: Upload pipeline results
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-results
          path: |
            results/
            predict.py
            figures-summary.zip
          overwrite: true

  build:
    needs: [pipeline]
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: predict-linux
            asset_name: predict-linux
          - os: windows-2022
            artifact_name: predict-windows.exe
            asset_name: predict-windows.exe
          - os: macos-14
            artifact_name: predict-macos-arm64
            asset_name: predict-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download pipeline results
        uses: actions/download-artifact@v4
        with:
          name: pipeline-results

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --frozen

      - name: Cache UPX (Windows)
        if: runner.os == 'Windows'
        id: cache-upx
        uses: actions/cache@v4
        with:
          path: upx-4.2.4-win64
          key: upx-4.2.4-windows

      - name: Install UPX (Windows)
        if: runner.os == 'Windows' && steps.cache-upx.outputs.cache-hit != 'true'
        run: |
          curl -sL https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-win64.zip -o upx.zip
          unzip -o upx.zip
          echo "${{ github.workspace }}/upx-4.2.4-win64" >> $env:GITHUB_PATH

      - name: Compute predict.py hash
        id: hash
        run: echo "sha256=$(python -c "import hashlib; print(hashlib.sha256(open('predict.py','rb').read()).hexdigest())")" >> $GITHUB_OUTPUT
        shell: bash

      - name: Cache binary (by predict.py hash)
        id: cache-binary
        uses: actions/cache@v4
        with:
          path: dist/predict${{ runner.os == 'Windows' && '.exe' || '' }}
          key: binary-${{ runner.os }}-${{ steps.hash.outputs.sha256 }}-${{ hashFiles('uv.lock') }}

      - name: Build executable (if cache miss)
        if: steps.cache-binary.outputs.cache-hit != 'true'
        shell: bash
        run: |
          uv run pyinstaller \
            --onefile \
            --name predict \
            --hidden-import dotenv \
            --collect-all numpy \
            --exclude-module scipy.stats \
            --exclude-module scipy.signal \
            --exclude-module scipy.fft \
            --exclude-module scipy.optimize \
            --exclude-module scipy.interpolate \
            --exclude-module scipy.integrate \
            --exclude-module scipy.io \
            --exclude-module scipy.ndimage \
            --exclude-module matplotlib \
            --exclude-module pandas \
            --distpath dist \
            --workpath build \
            --specpath build \
            predict.py

      - name: Smoke test (--help)
        run: |
          dist/predict${{ matrix.os == 'windows-2022' && '.exe' || '' }} --help

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/predict${{ matrix.os == 'windows-2022' && '.exe' || '' }}

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: predict-*
          path: artifacts

      - uses: actions/download-artifact@v4
        with:
          name: pipeline-results

      - name: Prepare assets
        run: |
          mv artifacts/predict-linux/predict predict-linux
          mv artifacts/predict-windows.exe/predict.exe predict-windows.exe
          mv artifacts/predict-macos-arm64/predict predict-macos-arm64
          rm -rf artifacts

      - name: Write release notes
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          CHANGELOG=""
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log --format="%s" --no-decorate "${PREV_TAG}..${GITHUB_REF_NAME}" 2>/dev/null || true)
          fi

          cat > release-notes.md << EOF
          $(if [ -n "$CHANGELOG" ]; then echo "## Изменения с момента предыдущего релиза"; echo; echo "<details>"; echo "<summary>\`${PREV_TAG}\` → \`${GITHUB_REF_NAME}\`</summary>"; echo; echo "\`\`\`"; echo "$CHANGELOG"; echo "\`\`\`"; echo "</details>"; echo; fi)

          ## Исполняемые файлы

          - **predict-linux** — Linux (x86_64)
          - **predict-macos-arm64** — macOS (Apple Silicon)
          - **predict-windows.exe** — Windows (x86_64)

          Собраны PyInstaller (onefile) и упакованы UPX. Не требуют Python.

          **predict.py** — скрипт для предсказания (без собранного бинарника).

          ## Архив с графиками

          **figures-summary.zip** — итоговые графики из `results/figures/summary/`.

          ## Полные результаты пайплайна

          Директория `results/` (volume_csv, regression_csv, regression_plots,
          optimize, downsample, figures) — в артефакте **pipeline-results** этого workflow-рана.

          ## Как использовать (бинарник)

          \`\`\`
          ./predict --cloud file.pcd
          ./predict --list data/list.txt --base-dir data
          \`\`\`

          ## Как использовать (predict.py)

          \`\`\`bash
          uv run predict.py --cloud file.pcd
          uv run predict.py --list data/list.txt --base-dir data
          \`\`\`

          На входе PCD-файлы, на выходе CSV с предсказанной биомассой (г).

          EOF

      - name: Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            2>/dev/null || true
          gh release upload "$GITHUB_REF_NAME" predict-linux --clobber
          gh release upload "$GITHUB_REF_NAME" predict-windows.exe --clobber
          gh release upload "$GITHUB_REF_NAME" predict-macos-arm64 --clobber
          gh release upload "$GITHUB_REF_NAME" predict.py --clobber
          gh release upload "$GITHUB_REF_NAME" figures-summary.zip --clobber


